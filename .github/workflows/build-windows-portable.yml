name: Build Windows Portable

on:
  workflow_dispatch:
  push:
    paths:
      - "windows_cache_*.cpp"
      - "windows_cache_*.h"
      - "windows_cache_rules.json"
      - "CMakeLists.txt"
      - ".github/workflows/build-windows-portable.yml"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.2"
          host: "windows"
          target: "desktop"
          arch: "win64_msvc2022_64"
          cache: true

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Detect Qt Prefix
        id: qtpaths
        shell: pwsh
        run: |
          $qmake = (Get-Command qmake).Source
          Write-Host "qmake: $qmake"
          $qtPrefix = & qmake -query QT_INSTALL_PREFIX
          if (-not $qtPrefix) {
            throw "Failed to detect QT_INSTALL_PREFIX from qmake"
          }
          "qt_prefix=$qtPrefix" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Qt prefix: $qtPrefix"

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build-win -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${{ steps.qtpaths.outputs.qt_prefix }}"

      - name: Build GUI
        shell: pwsh
        run: |
          cmake --build build-win --config Release --target windows_cache_scanner_gui

      - name: Prepare portable package
        shell: pwsh
        run: |
          if (!(Test-Path dist)) { New-Item -ItemType Directory -Path dist | Out-Null }
          Copy-Item build-win/windows_cache_scanner_gui.exe dist/ -Force
          Copy-Item windows_cache_rules.json dist/ -Force
          & windeployqt --release --dir dist build-win/windows_cache_scanner_gui.exe

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-cache-scanner-portable
          path: dist/**
          if-no-files-found: error
